{% extends "base.html" %}

{% block title %}Edit Test - TestFlow AI{% endblock %}

{% block navbar %}
<nav>
  <a href="/" class="nav-brand">
    <div class="logo">TF</div>
    TestFlow AI
  </a>
  <div class="nav-links">
    <a href="/tests" class="active">Tests</a>
    <a href="/create-test">Create</a>
    <a href="/discover">Discover</a>
    <a href="/settings">Settings</a>
  </div>
</nav>
{% endblock %}

{% block content %}
<div class="card card-wide">
  <div class="page-header">
    <h1>Edit Test Scenario</h1>
    <p>Update the details for "{{ test.name }}"</p>
  </div>

  <div class="divider"></div>

  <form method="post">
    <div class="form-group">
      <label for="test_name">Test Name</label>
      <input type="text" id="test_name" name="test_name" value="{{ test.name }}" required>
    </div>

    <div class="form-group">
      <label for="application_url">Application URL</label>
      <input type="text" id="application_url" name="application_url" value="{{ test.application_url }}" required>
    </div>

    <div class="form-group">
      <label for="steps_raw">Test Steps (natural language)</label>
      <textarea id="steps_raw" name="steps_raw" rows="8" required>{{ test.steps_raw }}</textarea>
    </div>

    <div class="form-group">
      <label for="expected_outcome">Expected Outcome</label>
      <input type="text" id="expected_outcome" name="expected_outcome" value="{{ test.expected_outcome }}" required>
    </div>

    <div class="divider"></div>

    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <a href="/tests" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
