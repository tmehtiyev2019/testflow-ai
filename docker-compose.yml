services:
  # TestFlow AI - Web Application (Interactive Mode)
  # Usage: docker-compose up webapp
  # Then open http://localhost:5001 in your browser
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testflow-ai-webapp
    volumes:
      - .:/app
      - ./screenshots:/app/src/static/screenshots
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TESTFLOW_SMTP_HOST=${TESTFLOW_SMTP_HOST:-}
      - TESTFLOW_SMTP_PORT=${TESTFLOW_SMTP_PORT:-}
      - TESTFLOW_SMTP_USERNAME=${TESTFLOW_SMTP_USERNAME:-}
      - TESTFLOW_SMTP_PASSWORD=${TESTFLOW_SMTP_PASSWORD:-}
      - TESTFLOW_SMTP_FROM=${TESTFLOW_SMTP_FROM:-}
      - TESTFLOW_SMTP_USE_TLS=${TESTFLOW_SMTP_USE_TLS:-1}
    ports:
      - "5001:5001"
    command: python -c "from src.app import create_app; app = create_app(); app.run(host='0.0.0.0', port=5001)"

  # TestFlow AI - Acceptance Tests
  # Usage: docker-compose run --rm testflow behave acceptance_tests/
  testflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testflow-ai-tests
    volumes:
      - .:/app
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: tail -f /dev/null
